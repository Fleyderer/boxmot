track_high_thresh:
  type: uniform
  default: 0.6  # from the default parameters
  range: [0.4, 0.6]
  
track_low_thresh:
  type: uniform
  default: 0.1  # from the default parameters
  range: [0.1, 0.3]
  
track_new_thresh:
  type: uniform
  default: 0.6  # from the default parameters
  range: [0.4, 0.6]
  
match_thresh:
  type: uniform
  default: 0.9  # from the default parameters
  range: [0.7, 0.9]

track_buffer:
  type: randint
  default: 30  # from the default parameters
  range: [10, 61, 10]  # step size of 10, upper bound exclusive

frame_rate:
  type: choice
  default: 30  # from the default parameters
  choices: [30]  # static choice for Ray Search
  
with_reid:
  type: choice
  default: False  # from the default parameters
  options: [False, True]
  
emb_mode:
  type: choice
  default: ema  # from the default parameters
  options: [ema, mean, last]
  
emb_ema_alpha:
  type: uniform
  default: 0.9  # from the default parameters
  range: [0.5, 0.9]
  
emb_max_count:
  type: randint
  default: 30  # from the default parameters
  range: [10, 31, 10]  # step size of 10, upper bound exclusive
  
dets_storage_size:
  type: choice
  default: 100  # from the default parameters
  range: [100]  # step size of 10, upper bound exclusive
  
tracks_storage_size:
  type: choice
  default: 100  # from the default parameters
  range: [100]  # step size of 10, upper bound exclusive

